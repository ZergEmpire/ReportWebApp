server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.application.name=report-web-app
# Локальные секреты (токен Allure и т.д.) — файл в корне report-web-app, в .gitignore
spring.config.import=optional:file:./application-local.properties
spring.thymeleaf.cache=false

spring.servlet.multipart.max-file-size=64MB
spring.servlet.multipart.max-request-size=64MB

# H2 file database (MVP; for prod можно заменить на PostgreSQL)
spring.datasource.url=jdbc:h2:file:./data/reportdb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Хранение: удалять записи старше N дней (по умолчанию 1 год)
report.retention.days=365
report.retention.cron=0 0 3 * * *

# Архив истории отчётов (компактный history-*.json.gz, не полный дамп H2)
report.backup.enabled=true
report.backup.directory=./backups
report.backup.cron=0 0 3 * * SUN
report.backup.keep-count=8
report.backup.on-startup=false
report.backup.skip-if-unchanged=true

# Allure TestOps — stacktrace по кнопке на странице прогона (CI-отчёты со ссылками launch/.../tree/{id})
report.allure.base-url=https://dersecur.testops.cloud
report.allure.api-token=${ALLURE_TESTOPS_TOKEN:}
report.allure.enabled=true

# Авторизация просмотра через ключ доступа/админа
# UI всегда под авторизацией; REPORT_AUTH_ENABLED не отключает доступ
report.auth.enabled=true
report.auth.admin-username=${REPORT_AUTH_ADMIN_USERNAME:admin}
report.auth.admin-password=${REPORT_AUTH_ADMIN_PASSWORD:1337ZergEmpire!}
report.auth.admin-contact-email=${REPORT_AUTH_ADMIN_CONTACT_EMAIL:s.kavalerov@rt-solar.ru}
report.auth.initial-access-key=${REPORT_AUTH_INITIAL_ACCESS_KEY:report-web-app-access-key}
