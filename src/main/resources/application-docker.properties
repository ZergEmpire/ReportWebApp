# Профиль docker: пути данных в контейнере (/app)
server.address=0.0.0.0
server.port=8080
spring.datasource.url=jdbc:h2:file:/app/data/reportdb;DB_CLOSE_DELAY=-1
report.backup.directory=/app/backups

# Авторизация UI обязательна (не отключать на стенде)
report.auth.enabled=true

# Время в UI — Москва (хранение в БД остаётся UTC)
report.display.time-zone=Europe/Moscow
report.display.date-time-pattern=dd.MM.yyyy HH:mm
