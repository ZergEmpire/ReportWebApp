# Конфигурация для https://amvera.ru — коммитьте в репозиторий.
# docker-compose на Amvera НЕ поддерживается: https://docs.amvera.ru/applications/configuration/docker.html

meta:
  environment: docker
  toolchain:
    name: docker

build:
  dockerfile: Dockerfile

run:
  # Явная команда перебивает ошибочное "docker compose up" из UI Amvera
  command: /app/docker-entrypoint.sh
  containerPort: 8080
  persistenceMount: /data
