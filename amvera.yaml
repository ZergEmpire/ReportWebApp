# Конфигурация для https://amvera.ru — коммитьте в репозиторий.
# docker-compose на Amvera НЕ поддерживается: https://docs.amvera.ru/applications/configuration/docker.html

meta:
  environment: docker
  toolchain:
    name: docker

build:
  dockerfile: Dockerfile

run:
  containerPort: 8080
  persistenceMount: /data
  # command и args НЕ указывать — запуск через ENTRYPOINT в Dockerfile (java -jar).
  # Не используйте "docker compose up" — платформа сама собирает образ из Dockerfile.
