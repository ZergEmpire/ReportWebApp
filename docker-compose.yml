# Базовый compose для Timeweb App Platform (Docker Compose).
# Образ собирается в GitHub Actions → ghcr.io/zergempire/report-web-app
# Тег фиксируется на коммит (обновляется workflow Docker image) — Timeweb иначе не перекачивает :latest из кэша.
# Локально: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build
# В манифесте нельзя использовать volumes — см. https://timeweb.cloud/docs/apps/deploying-with-docker-compose

services:
  report-web-app:
    image: ghcr.io/zergempire/report-web-app:42b13b45afe32263e5c79bca944ce57d3ccce6ca
    ports:
      - "8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      REPORT_SEED_DEMO: "${REPORT_SEED_DEMO:-false}"
      ALLURE_TESTOPS_TOKEN: "${ALLURE_TESTOPS_TOKEN:-}"
      REPORT_AUTH_INITIAL_ACCESS_KEY: "${REPORT_AUTH_INITIAL_ACCESS_KEY:-}"
