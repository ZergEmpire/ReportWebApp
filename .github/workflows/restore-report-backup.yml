# Secrets: Environment «Report web app» — REPORT_WEB_APP_URL, REPORT_ACCESS_KEY

name: Restore report backup

on:
  workflow_dispatch:
    inputs:
      backup_run_id:
        description: "Run ID workflow Report backup (число из URL actions/runs/...)"
        required: true
        type: string

permissions:
  actions: read
  contents: read

jobs:
  restore:
    runs-on: ubuntu-latest
    environment:
      name: Report web app
    env:
      REPORT_WEB_APP_URL: ${{ secrets.REPORT_WEB_APP_URL }}
      REPORT_ACCESS_KEY: ${{ secrets.REPORT_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Check secrets are configured
        run: |
          if [ -z "${REPORT_WEB_APP_URL}" ] || [ -z "${REPORT_ACCESS_KEY}" ]; then
            echo "::error::Environment secrets не заданы (Report web app)."
            exit 1
          fi

      - name: Download backup artifact from run
        uses: actions/download-artifact@v4
        with:
          name: report-history-${{ inputs.backup_run_id }}
          run-id: ${{ inputs.backup_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore on server
        run: |
          export BACKUP_FILE="$(ls -1t backups/*.json.gz | head -1)"
          bash scripts/restore-report-backup.sh
