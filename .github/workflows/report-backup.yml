# Secrets: Settings → Environments → Report web app → Environment secrets
#   REPORT_WEB_APP_URL, REPORT_ACCESS_KEY

name: Report backup

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  download:
    runs-on: ubuntu-latest
    environment:
      name: Report web app
    env:
      REPORT_WEB_APP_URL: ${{ secrets.REPORT_WEB_APP_URL }}
      REPORT_ACCESS_KEY: ${{ secrets.REPORT_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Check secrets are configured
        run: |
          if [ -z "${REPORT_WEB_APP_URL}" ] || [ -z "${REPORT_ACCESS_KEY}" ]; then
            echo "::error::Secrets пустые. Добавьте REPORT_WEB_APP_URL и REPORT_ACCESS_KEY в"
            echo "::error::Settings → Environments → Report web app → Environment secrets"
            echo "::error::Запускайте Run workflow на main (не Re-run старого run без environment в yaml)."
            exit 1
          fi
          echo "Secrets OK (значения в логе скрыты GitHub — это нормально)."

      - name: Download report history archive
        run: bash scripts/download-report-backup.sh

      - uses: actions/upload-artifact@v4
        with:
          name: report-history-${{ github.run_id }}
          path: backups/
          retention-days: 90
