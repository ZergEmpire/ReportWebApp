# Скачивание history-*.json.gz с Report Web App (расписание или вручную).
#
# Secrets в Environment «Report web app» (Settings → Environments):
#   REPORT_WEB_APP_URL, REPORT_ACCESS_KEY
#
# Расписание: ежедневно 04:00 UTC. Вручную: Actions → Report backup → Run workflow.

name: Report backup

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  download:
    runs-on: ubuntu-latest
    environment: Report web app
    steps:
      - uses: actions/checkout@v4

      - name: Download report history archive
        env:
          REPORT_WEB_APP_URL: ${{ secrets.REPORT_WEB_APP_URL }}
          REPORT_ACCESS_KEY: ${{ secrets.REPORT_ACCESS_KEY }}
        run: bash scripts/download-report-backup.sh

      - uses: actions/upload-artifact@v4
        with:
          name: report-history-${{ github.run_id }}
          path: backups/
          retention-days: 90
