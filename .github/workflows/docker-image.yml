# Сборка Docker-образа в GitHub Actions (обход кэша Timeweb).
# Пакет GHCR: ghcr.io/zergempire/report-web-app — сделайте public в GitHub Packages.
name: Docker image

on:
  push:
    branches: [main]
    paths-ignore:
      - docker-compose.yml
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Image name (GHCR requires lowercase)
        id: image
        run: echo "name=ghcr.io/zergempire/report-web-app" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          no-cache: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}

      - name: Pin image tag in docker-compose.yml
        run: |
          sed -i "s|image: ghcr.io/zergempire/report-web-app:.*|image: ghcr.io/zergempire/report-web-app:${{ github.sha }}|" docker-compose.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docker-compose.yml
          git diff --staged --quiet || git commit -m "Pin GHCR image to ${{ github.sha }} for Timeweb deploy."
          git push
